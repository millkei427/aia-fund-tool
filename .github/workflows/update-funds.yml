name: 自動更新基金價格

on:
  schedule:
    # 香港時間每星期日凌晨 2:00 = UTC 星期六 18:00
    - cron: '0 18 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-funds:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run fund scraper
        id: scrape
        run: python scripts/fetch_funds.py

      - name: Upload debug screenshot if failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: scripts/_debug_screenshot.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit & Push if changed
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/funds.json; then
            echo "No changes — skipping commit."
          else
            git add data/funds.json
            git commit -m "🤖 Auto-update fund prices ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ Pushed updated fund prices."
          fi
