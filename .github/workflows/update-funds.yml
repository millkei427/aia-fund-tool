name: 自動更新基金價格

on:
  schedule:
    - cron: '0 18 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-funds:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install playwright requests pdfplumber
          playwright install chromium --with-deps
      - name: Run fund scraper
        run: python scripts/fetch_funds.py
      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            scripts/_debug_screenshot.png
            scripts/_debug_page.html
          if-no-files-found: ignore
          retention-days: 7
      - name: Commit & Push if changed
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/funds.json; then
            echo "No changes — skipping commit."
          else
            git add data/funds.json
            git commit -m "🤖 Auto-update fund prices ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
